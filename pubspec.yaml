name: live_photos_plus
description: >-
  Generate iOS-wallpaper-compatible Live Photos from video files or URLs.
  Outputs HEIC + MOV pair saved to Camera Roll, ready for use as Live Wallpaper.
version: 1.0.0
homepage: 'https://github.com/YuheiNakasaka/flutter_live_photos'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: LivePhotosPlusPlugin
